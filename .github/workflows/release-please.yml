name: Release Please

permissions:
  contents: write
  pull-requests: write
  issues: write

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: google-github-actions/release-please-action@v3
        with:
          release-type: python
          package-name: finance-mosaix
          token: ${{ secrets.GITHUB_TOKEN }}
