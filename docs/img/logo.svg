<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Finance Mosaix logo">
  <defs>
    <linearGradient id="fm-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f2138"/>
    </linearGradient>
    <linearGradient id="fm-accent" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#2fd18f"/>
      <stop offset="100%" stop-color="#7ee8b8"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#fm-bg)"/>

  <!-- mosaic tiles -->
  <g opacity="0.55">
    <rect x="16" y="16" width="20" height="20" rx="3" fill="#3f6a94"/>
    <rect x="40" y="16" width="20" height="20" rx="3" fill="#345a80"/>
    <rect x="16" y="40" width="20" height="20" rx="3" fill="#345a80"/>
    <rect x="92" y="92" width="20" height="20" rx="3" fill="#2fd18f" opacity="0.35"/>
    <rect x="92" y="68" width="20" height="20" rx="3" fill="#3f6a94"/>
    <rect x="68" y="92" width="20" height="20" rx="3" fill="#3f6a94"/>
  </g>

  <!-- bar chart / mosaic ascending bars representing finance growth -->
  <g>
    <rect x="28" y="78" width="14" height="30" rx="2" fill="url(#fm-accent)"/>
    <rect x="48" y="64" width="14" height="44" rx="2" fill="url(#fm-accent)"/>
    <rect x="68" y="48" width="14" height="60" rx="2" fill="url(#fm-accent)"/>
    <rect x="88" y="32" width="14" height="76" rx="2" fill="url(#fm-accent)"/>
  </g>

  <!-- trend line -->
  <polyline points="30,80 55,62 75,46 95,28" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <circle cx="95" cy="28" r="5" fill="#ffffff"/>
</svg>
