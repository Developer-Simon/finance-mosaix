title: Finance Mosaix
description: DuckDB-backed personal finance tracker documentation for CLI tools, dashboard workflows, and data import.
url: "https://Developer-Simon.github.io"
baseurl: "/finance-mosaix"

github:
  username: Developer-Simon

social:
  name: Finance Mosaix
  email: ""
  fediverse_handle: ""
  links:
    - https://github.com/Developer-Simon

theme: jekyll-theme-chirpy
tagline: "DuckDB-backed personal finance tracker documentation"
favicon: "/img/favicon.ico"
avatar: "/img/logo.svg"
tabs:
  - title: "Installation"
    url: "/installation/"
    icon: "fas fa-download"
  - title: "CLI Reference"
    url: "/cli/"
    icon: "fas fa-terminal"
  - title: "Dashboard"
    url: "/dashboard/"
    icon: "fas fa-chart-line"
  - title: "Architecture"
    url: "/architecture/"
    icon: "fas fa-sitemap"
  - title: "Data Flow"
    url: "/data-flow/"
    icon: "fas fa-stream"
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-archives
  - jekyll-paginate
  - jekyll-redirect-from
  - jekyll-include-cache
  - jekyll-last-modified-at
# boolean type, the global switch for the TOC (Contents lookup) panel in Chirpy.
toc: true
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  toc_levels: 1..3
  syntax_highlighter: rouge
permalink: pretty
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - finance.duckdb
  - finance_test.duckdb
  - finance_sample.duckdb
header_pages:
  - index.md
  - installation.md
  - architecture.md
  - cli.md
  - dashboard.md
  - data-flow.md
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
      author: "Finance Mosaix"
      toc: true
      panel_includes:
        - toc
      show_sidebar: true
      sidebar:
        - title: "Docs"
          items:
            - title: "Installation"
              url: "/installation/"
            - title: "Architecture"
              url: "/architecture/"
            - title: "CLI Reference"
              url: "/cli/"
            - title: "Dashboard"
              url: "/dashboard/"
            - title: "Data Flow"
              url: "/data-flow/"
